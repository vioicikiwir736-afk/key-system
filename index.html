<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Key System</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at top, #2a0000, #000);
    color: white;
}

.box {
    width: 340px;
    padding: 25px;
    border-radius: 16px;
    background: rgba(255, 0, 0, 0.08);
    border: 1px solid rgba(255, 0, 0, 0.35);
    backdrop-filter: blur(12px);
    box-shadow: 0 0 30px rgba(255,0,0,0.25);
    text-align: center;
}

h1 {
    color: #ff2b2b;
    text-shadow: 0 0 12px red;
    margin-bottom: 8px;
}

p {
    opacity: 0.8;
    font-size: 13px;
}

button {
    margin-top: 18px;
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(90deg, #ff0000, #7a0000);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
    box-shadow: 0 0 15px rgba(255,0,0,0.4);
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 25px rgba(255,0,0,0.7);
}

.key {
    margin-top: 15px;
    padding: 10px;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(255,0,0,0.3);
    border-radius: 10px;
    word-break: break-all;
    font-size: 13px;
}
</style>
</head>

<body>

<div class="box">
    <h1>KEY SYSTEM</h1>
    <p>Click button to generate your key</p>

    <button onclick="getKey()">GET KEY</button>

    <div class="key" id="result">Waiting for key...</div>
</div>

<script>
async function getKey() {
    try {
        const res = await fetch("/api/get-key");
        const data = await res.json();

        if (data.success) {
            document.getElementById("result").innerText = data.key;
        } else {
            document.getElementById("result").innerText = "Failed to generate key";
        }
    } catch (e) {
        document.getElementById("result").innerText = "Server error";
    }
}
</script>

</body>
</html>
